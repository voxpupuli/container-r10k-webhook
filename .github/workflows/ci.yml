---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 🚦 CI

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Set up build matrix
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1

      - name: Generate build matrix
        id: build-matrix
        run: echo "build-matrix=$(bash matrix.sh build)" >> "$GITHUB_OUTPUT"

  general-ci:
    name: General CI
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: voxpupuli/crafty/.github/workflows/general_ci.yaml@main
    with:
      shellcheck_scan_dir: '.'

  build-container:
    name: Build test container
    runs-on: ${{ matrix.runner }}
    needs:
      - setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.build-matrix) }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          tags: 'ci/r10k-webhook:${{ matrix.source_webhook_go }}'
          push: false
          platforms: linux/${{ matrix.platform }}
          build-args: |
            R10K_VERSION=${{ matrix.container_r10k }}
            WEBHOOK_GO_VERSION=${{ matrix.source_webhook_go }}

  tests:
    name: Test suite
    if: always()
    needs:
      - setup-matrix
      - general-ci
      - build-container
    runs-on: ubuntu-24.04
    steps:
      - name: Verify required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  dependabot:
    name: Dependabot auto-merge
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    needs:
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge "$PR_URL"
